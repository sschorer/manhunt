# Full local development stack — Postgres + Redis + server + client.
#
# Unlike the production stack in compose.yml (prebuilt image behind Caddy), this
# runs the server and client straight from your working tree with live reload:
# the source is bind-mounted in and `node --watch` / Vite pick up edits. Deps are
# installed inside the containers (anonymous node_modules volumes) so native
# binaries like esbuild match the container, and the host's node_modules are
# never used. Its own project name and volume keep this separate from prod.
#
#   docker compose -f compose.dev.yml up        # or: make dev-up   (add -d to detach)
#
#   Client   → https://localhost:5173  (Vite over TLS, proxies /socket.io + /health)
#   Server   → http://localhost:3000
#   Postgres → localhost:5432   (manhunt/manhunt/manhunt)
#   Redis    → localhost:6379
#
# The client is served over HTTPS so GPS works from phones on your network (the
# Geolocation API needs a secure context). Run `make dev-certs` first to mint a
# locally-trusted mkcert cert into ./certs; trust the mkcert root CA on the phone
# once, then open https://<your-host-LAN-IP>:5173 with no warning.

name: manhunt-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=manhunt
      - POSTGRES_PASSWORD=manhunt
      - POSTGRES_DB=manhunt
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manhunt -d manhunt"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Install deps into the container's node_modules, then run with live reload.
    command: sh -c "npm ci && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgres://manhunt:manhunt@db:5432/manhunt
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=dev-secret
      # Apply pending migrations on boot so the schema is ready out of the box.
      - RUN_MIGRATIONS=true
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules
      - server_client_node_modules:/app/client/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Run Vite directly in the client workspace so --host (bind 0.0.0.0, making
    # it reachable from the host) reaches Vite instead of the wrapper npm script.
    command: sh -c "npm ci && npm run dev --workspace client -- --host 0.0.0.0"
    environment:
      # Where Vite proxies /socket.io + /health (the server service on this
      # network). Deliberately NOT VITE_-prefixed so it stays server-side only:
      # the browser keeps connecting same-origin (to the Vite dev server), which
      # avoids CORS to an unreachable Docker-internal hostname.
      - DEV_PROXY_TARGET=http://server:3000
      # Serve Vite over HTTPS so the browser Geolocation API works when the
      # client is opened from another device on the LAN by IP — GPS requires a
      # secure context, which plain http://<host-ip>:5173 is not. The cert below
      # is a locally-trusted mkcert cert (run `make dev-certs` first) so phones
      # show no warning once they trust the mkcert root CA.
      - DEV_HTTPS=true
      - DEV_HTTPS_CERT=/certs/dev-cert.pem
      - DEV_HTTPS_KEY=/certs/dev-key.pem
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
      - client_client_node_modules:/app/client/node_modules
      # Locally-trusted TLS cert generated on the host by `make dev-certs`.
      - ./certs:/certs:ro
    depends_on:
      - server

volumes:
  pgdata_dev:
  # Per-service node_modules so the host's are never mounted over the container's
  # and the two Node services don't fight over one install.
  server_node_modules:
  server_client_node_modules:
  client_node_modules:
  client_client_node_modules:
