# Full local development stack — Postgres + Redis + server + client.
#
# Unlike the production stack in compose.yml (prebuilt image behind Caddy), this
# runs the server and client straight from your working tree with live reload:
# the source is bind-mounted in and `node --watch` / Vite pick up edits. Deps are
# installed inside the containers (anonymous node_modules volumes) so native
# binaries like esbuild match the container, and the host's node_modules are
# never used. Its own project name and volume keep this separate from prod.
#
#   docker compose -f compose.dev.yml up        # or: make dev-up   (add -d to detach)
#
#   Client   → http://localhost:5173   (Vite, proxies /socket.io + /health to the server)
#   Server   → http://localhost:3000
#   Postgres → localhost:5432   (manhunt/manhunt/manhunt)
#   Redis    → localhost:6379

name: manhunt-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=manhunt
      - POSTGRES_PASSWORD=manhunt
      - POSTGRES_DB=manhunt
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manhunt -d manhunt"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Install deps into the container's node_modules, then run with live reload.
    command: sh -c "npm ci && npm run dev"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgres://manhunt:manhunt@db:5432/manhunt
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=dev-secret
      # Apply pending migrations on boot so the schema is ready out of the box.
      - RUN_MIGRATIONS=true
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - server_node_modules:/app/node_modules
      - server_client_node_modules:/app/client/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    # Run Vite directly in the client workspace so --host (bind 0.0.0.0, making
    # it reachable from the host) reaches Vite instead of the wrapper npm script.
    command: sh -c "npm ci && npm run dev --workspace client -- --host 0.0.0.0"
    environment:
      # Where Vite proxies /socket.io + /health (the server service on this network).
      - VITE_SERVER_URL=http://server:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - client_node_modules:/app/node_modules
      - client_client_node_modules:/app/client/node_modules
    depends_on:
      - server

volumes:
  pgdata_dev:
  # Per-service node_modules so the host's are never mounted over the container's
  # and the two Node services don't fight over one install.
  server_node_modules:
  server_client_node_modules:
  client_node_modules:
  client_client_node_modules:
