name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the image to GHCR

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Build the release image into the local daemon and smoke-test it end to
      # end — it must boot and answer /health — before we publish anything.
      - name: Build image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: manhunt:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the image
        run: |
          docker run -d --name manhunt-smoke -p 3000:3000 manhunt:smoke
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/health | grep -q '"ok":true'; then
              ok=1; break
            fi
            sleep 1
          done
          docker logs manhunt-smoke
          docker rm -f manhunt-smoke >/dev/null 2>&1 || true
          if [ "$ok" != "1" ]; then
            echo "::error::release image failed to become healthy"
            exit 1
          fi
          echo "release image booted and answered /health"

      # Only authenticate and publish once the image is validated. The build is
      # a cache hit from the smoke-test build above, so this is fast.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push :<version> and :latest to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for the changelog
      - id: changelog
        run: |
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$prev" ]; then range="${prev}..${GITHUB_REF_NAME}"; else range="${GITHUB_REF_NAME}"; fi
          {
            echo "body<<__EOF__"
            bash scripts/changelog.sh "$range"
            echo "### Docker image"
            echo ""
            echo '```'
            echo "docker pull ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_REF_NAME#v}"
            echo '```'
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
