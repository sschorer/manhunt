name: Vouch Manage

# Lets maintainers edit VOUCHED.td by commenting on an issue:
#   vouch @handle
#   denounce @handle <reason>
#   unvouch @handle
#
# pull-request: true means these open a PR rather than pushing to master.
# The trust list is the most security-sensitive file in the repo — it should
# change through the same reviewed path as code.

on:
  issue_comment:
    types: [created]

# Serialize: two concurrent edits to VOUCHED.td would clobber each other.
concurrency:
  group: vouch-manage
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  manage:
    runs-on: ubuntu-24.04
    # Cheap pre-filter so we don't spin a job on every comment in the repo:
    # require a trusted commenter and a command-shaped body. manage-by-issue
    # re-checks the commenter's role as defense in depth.
    if: >
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (startsWith(github.event.comment.body, 'vouch ') ||
       startsWith(github.event.comment.body, 'denounce ') ||
       startsWith(github.event.comment.body, 'unvouch '))
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - uses: mitchellh/vouch/action/manage-by-issue@d66fa29a64600490892131ad87597c30c91fcac4 # v1.5.0
        with:
          repo: ${{ github.repository }}
          issue-id: ${{ github.event.issue.number }}
          comment-id: ${{ github.event.comment.id }}
          pull-request: true
          dry-run: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
